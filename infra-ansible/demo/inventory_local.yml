---
# Local inventory for Vagrant demo
# Use this instead of inventory/dev.yml when testing with the Vagrant VM
#
# The only difference from inventory/dev.yml:
#   ansible_ssh_private_key_file points to the key we generated locally (demo/deploy_key)
#   instead of the Jenkins-injected key

all:
  children:
    dev:
      hosts:
        dev-app-01:
          ansible_host: 192.168.10.10          # Vagrant VM IP (set in Vagrantfile)
          ansible_user: deploy                  # user created by Vagrantfile provisioner
          ansible_port: 22
          ansible_ssh_private_key_file: "demo/deploy_key"   # generated by generate_key.sh
          app_domain: api-dev.myapp.internal
          app_port: 8080